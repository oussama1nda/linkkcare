<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkCare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scene">
    <div class="phone">
      <div class="screen" id="screen">
        <div class="di"></div>

        <div class="sb">
          <span>9:41</span>
          <span></span>
          <span class="sb-icons">
            <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
              <rect x="0" y="4" width="3" height="7" rx="1" fill="rgba(255,255,255,0.4)"/>
              <rect x="4.5" y="2.5" width="3" height="8.5" rx="1" fill="rgba(255,255,255,0.65)"/>
              <rect x="9" y="0" width="3" height="11" rx="1" fill="white"/>
              <rect x="13" y="1.5" width="2" height="8" rx="0.8" fill="rgba(255,255,255,0.5)"/>
            </svg>
            <svg width="17" height="11" viewBox="0 0 17 11" fill="none">
              <rect x="0.5" y="0.5" width="13" height="10" rx="2.5" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
              <rect x="2" y="2" width="8" height="7" rx="1.5" fill="white"/>
              <rect x="14" y="3.5" width="2.5" height="4" rx="1" fill="rgba(255,255,255,0.5)"/>
            </svg>
          </span>
        </div>

        <div class="hdr">
          <div class="hdr-top">
            <div class="logo-row">
              <div class="logo-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 21C12 21 4 15.5 4 9.5a8 8 0 0116 0c0 6-8 11.5-8 11.5z"/>
                  <circle cx="12" cy="9.5" r="2.5" fill="white" stroke="none"/>
                </svg>
              </div>
              <div class="app-name">Link<span>Care</span></div>
            </div>
            <div class="notif-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 01-3.46 0"/>
              </svg>
              <div class="notif-dot"></div>
            </div>
          </div>

          <div class="greeting">Bonjour,</div>
          <div class="greeting-name">Dr. Karim 👋</div>

          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-label">Aujourd'hui</div>
              <div class="stat-val blue" id="cnt-today">3</div>
              <div class="stat-sub">médicaments</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Pris</div>
              <div class="stat-val green" id="cnt-taken">1</div>
              <div class="stat-sub">confirmés</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Prochain</div>
              <div class="stat-val amber">12:00</div>
              <div class="stat-sub">rappel</div>
            </div>
          </div>
        </div>

        <div class="content" id="list-wrap">
          <div class="sec-row">
            <span class="sec-title">Mes médicaments</span>
            <span class="sec-link">Voir tout</span>
          </div>
          <div id="med-list"></div>
          <div style="height:8px;"></div>
        </div>

        <button class="add-fab" onclick="openSheet()">
          <span class="fab-plus">+</span>
          Ajouter un médicament
        </button>

        <div class="overlay" id="overlay" onclick="handleOverlay(event)">
          <div class="sheet" id="sheet">
            <div class="handle"></div>
            <div class="sheet-title">Nouveau médicament</div>
            <div class="sheet-sub">Remplissez les informations ci-dessous</div>

            <div class="fg">
              <label class="fl">Nom</label>
              <input type="text" class="fi" id="f-name" placeholder="Ex : Paracétamol">
            </div>
            <div class="fi-row">
              <div class="fg">
                <label class="fl">Dosage</label>
                <input type="text" class="fi" id="f-dose" placeholder="500 mg">
              </div>
              <div class="fg">
                <label class="fl">Heure</label>
                <input type="time" class="fi" id="f-time" value="08:00">
              </div>
            </div>
            <div class="fg">
              <label class="fl">Fréquence</label>
              <select class="fi" id="f-freq">
                <option value="">Sélectionner...</option>
                <option>1x par jour</option>
                <option>2x par jour</option>
                <option>3x par jour</option>
                <option>4x par jour</option>
                <option>Au besoin</option>
              </select>
            </div>
            <div class="fg">
              <label class="fl">Notes</label>
              <input type="text" class="fi" id="f-notes" placeholder="Ex : Après le repas">
            </div>

            <div class="sheet-btns">
              <button class="bs" onclick="addMed()">Ajouter</button>
              <button class="bc" onclick="closeSheet()">Annuler</button>
            </div>
          </div>
        </div>

        <div class="toast-bar" id="toast">
          <div class="toast-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <span id="toast-msg">Médicament ajouté</span>
        </div>

      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
